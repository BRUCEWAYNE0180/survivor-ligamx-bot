name: Auto-Alerts Telegram

on:
  schedule:
    - cron: '0 */6 * * *'  # Cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  alerts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Trigger Telegram Alerts
      run: |
        curl -X POST https://survivor-ligamx-bot.onrender.com/alerts/high-ev \
          -H "X-API-Key: survivor-ligamx-premium-2026" \
          -H "Content-Type: application/json"
