name: CI/CD
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: {python-version: '3.9'}
      - name: Install deps
        run: pip install pandas numpy pyarrow requests python-dotenv
      - name: Validate
        run: python -c "import os; assert os.path.isdir('src') and os.path.isfile('run_bot_prod.sh')"